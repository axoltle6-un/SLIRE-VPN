version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: slire_user
      POSTGRES_PASSWORD: slire_password
      POSTGRES_DB: slire_vpn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://slire_user:slire_password@postgres:5432/slire_vpn
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_change_in_prod
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
