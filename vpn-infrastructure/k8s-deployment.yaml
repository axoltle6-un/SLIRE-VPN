apiVersion: apps/v1
kind: Deployment
metadata:
  name: slire-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: slire-backend
  template:
    metadata:
      labels:
        app: slire-backend
    spec:
      containers:
      - name: slire-backend
        image: your-docker-registry.com/slire/backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: slire-secrets
              key: db-url
---
apiVersion: v1
kind: Service
metadata:
  name: slire-backend-svc
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: slire-backend
